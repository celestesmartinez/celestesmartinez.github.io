<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portafolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens ── */
    :root {
      --bg:          #f4f3ef;
      --surface:     #ffffff;
      --primary:     #1b3358;
      --accent:      #b05e26;
      --text:        #1c1c1e;
      --muted:       #6b7280;
      --border:      #dde2eb;
      --tag-bg:      #edf0f7;
      --shadow-sm:   0 1px 3px rgba(0,0,0,0.07);
      --shadow-md:   0 4px 14px rgba(0,0,0,0.09);
      --radius:      6px;
      --ff-display:  'Lora', Georgia, serif;
      --ff-body:     'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ff-body);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 3.5rem 1.5rem 3rem;
    }
    .hdr-inner {
      max-width: 880px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .hdr-eyebrow {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 0.6rem;
    }
    #hdr-name {
      font-family: var(--ff-display);
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: -0.01em;
    }
    #hdr-title {
      margin-top: 0.45rem;
      font-size: 0.88rem;
      font-weight: 300;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.015em;
    }
    .hdr-rule {
      width: 36px;
      height: 2px;
      background: var(--accent);
      margin: 1.4rem 0 1rem;
    }
    #hdr-bio {
      font-size: 0.92rem;
      color: rgba(255,255,255,0.8);
      max-width: 520px;
      line-height: 1.72;
    }
    .hdr-links {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      margin-top: 1.6rem;
    }
    .hdr-links a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      transition: color 0.15s;
    }
    .hdr-links a:hover { color: #fff; }
    .hdr-links svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* ── Main ── */
    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
    }

    /* ── Controls row ── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.8rem;
    }

    /* ── Filters ── */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }
    .filter-btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      border-radius: 20px;
      padding: 0.28rem 0.85rem;
      font-size: 0.78rem;
      font-family: var(--ff-body);
      cursor: pointer;
      transition: background 0.14s, border-color 0.14s, color 0.14s;
      white-space: nowrap;
    }
    .filter-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ── Stats ── */
    .stats {
      display: flex;
      gap: 1.5rem;
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .stats strong { color: var(--text); font-weight: 600; }

    /* ── Grid ── */
    .repo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 1.1rem;
    }

    /* ── Card ── */
    .repo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.35rem 1.35rem 1.1rem;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.18s, transform 0.18s, border-color 0.18s;
      /* Signature: accent left bar on hover */
      border-left: 3px solid transparent;
    }
    .repo-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-left-color: var(--accent);
    }
    .card-name {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--primary);
      word-break: break-word;
      margin-bottom: 0.45rem;
      line-height: 1.35;
    }
    .card-desc {
      font-size: 0.81rem;
      color: var(--muted);
      line-height: 1.58;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-desc.empty {
      font-style: italic;
      color: #c0c4cc;
    }
    .card-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.75rem;
    }
    .card-topic {
      font-size: 0.68rem;
      background: var(--tag-bg);
      color: var(--primary);
      border-radius: 3px;
      padding: 0.15rem 0.48rem;
      font-weight: 500;
    }
    .card-foot {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .card-lang {
      display: flex;
      align-items: center;
      gap: 0.32rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .lang-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .card-stat {
      display: flex;
      align-items: center;
      gap: 0.22rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .card-stat svg { width: 12px; height: 12px; }
    .card-updated {
      margin-left: auto;
      font-size: 0.7rem;
      color: #b0b7c3;
    }

    /* ── States ── */
    .state-box {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
      font-size: 0.88rem;
    }
    .spinner {
      display: inline-block;
      width: 26px; height: 26px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      margin-top: 3.5rem;
      border-top: 1px solid var(--border);
      padding-top: 1.4rem;
      text-align: center;
      font-size: 0.72rem;
      color: #bbb;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    @media (max-width: 580px) {
      .repo-grid { grid-template-columns: 1fr; }
      .controls { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- ═══════════════ HEADER ═══════════════ -->
<header>
  <div class="hdr-inner">
    <div class="hdr-eyebrow">Portafolio de proyectos</div>
    <div id="hdr-name">…</div>
    <div id="hdr-title"></div>
    <div class="hdr-rule"></div>
    <div id="hdr-bio"></div>
    <nav class="hdr-links" id="hdr-links" aria-label="Links"></nav>
  </div>
</header>

<!-- ═══════════════ MAIN ═══════════════ -->
<main>
  <div class="controls">
    <div class="filters" id="filters" role="group" aria-label="Filtrar por lenguaje"></div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="repo-grid" id="repo-grid" role="list">
    <div class="state-box">
      <div class="spinner"></div><br>Cargando repositorios…
    </div>
  </div>
  <footer>
    Generado automáticamente desde la
    <a href="https://docs.github.com/en/rest" target="_blank" rel="noopener">API de GitHub</a>
  </footer>
</main>

<script>
/* ╔═══════════════════════════════════════╗
   ║  CONFIGURACIÓN — editá estos valores  ║
   ╚═══════════════════════════════════════╝ */
const CONFIG = {
  username:    'celestesmartinez',           // ← OBLIGATORIO: tu usuario de GitHub
  name:        'Cele',                   // nombre que aparece en el encabezado
  title:       'Portfolio sobre mis trabajos',
  bio:         'Intereses en machine learning, estadística aplicada y análisis de datos aplicado a estudios genómicos. ' +
               'Esta página reúne mis proyectos y trabajos de curso.',
  linkedinUrl: '',    // www.linkedin.com/in/celeste-sabrina-martínez-2a8005208, o '' para ocultar
  email:       '',    // celestesmartinez@gmail.com, o '' para ocultar
  showForks:   false, // true para incluir repositorios forkeados
  pinnedFirst: [],    // ['repo-name-1', 'repo-name-2'] para mostrar primero
};
/* ══════════════════════════════════════ */


// ─── Colores por lenguaje ───────────────────────────────────────────────────
const LANG_COLORS = {
  'Python': '#3776ab', 'R': '#276dc3', 'Jupyter Notebook': '#da5b0b',
  'JavaScript': '#f1e05a', 'TypeScript': '#3178c6', 'HTML': '#e34c26',
  'CSS': '#563d7c', 'Shell': '#89e051', 'Bash': '#89e051',
  'SQL': '#e38c00', 'Julia': '#9558b2', 'Java': '#b07219',
  'C': '#555555', 'C++': '#f34b7d', 'Go': '#00add8', 'Rust': '#dea584',
  'Markdown': '#083fa1', 'MATLAB': '#e16737', 'Scala': '#dc322f',
};

// ─── SVG icons ───────────────────────────────────────────────────────────────
const I = {
  github: `<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>`,
  linkedin: `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`,
  mail: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>`,
  star: `<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/></svg>`,
  fork: `<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M5 3.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm0 2.122a2.25 2.25 0 10-1.5 0v.878A2.25 2.25 0 005.75 8.5h1.5v2.128a2.251 2.251 0 101.5 0V8.5h1.5a2.25 2.25 0 002.25-2.25v-.878a2.25 2.25 0 10-1.5 0v.878a.75.75 0 01-.75.75h-4.5A.75.75 0 015 6.25v-.878zm3.75 7.378a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm3-8.75a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/></svg>`,
};

// ─── Tiempo relativo ─────────────────────────────────────────────────────────
function ago(dateStr) {
  const d = Math.floor((Date.now() - new Date(dateStr)) / 86400000);
  if (d < 1) return 'hoy';
  if (d < 7) return `hace ${d}d`;
  const w = Math.floor(d / 7);
  if (w < 5) return `hace ${w} sem.`;
  const m = Math.floor(d / 30);
  if (m < 12) return `hace ${m} mes${m > 1 ? 'es' : ''}`;
  return `hace ${Math.floor(m / 12)} año${Math.floor(m / 12) > 1 ? 's' : ''}`;
}

// ─── Encabezado ──────────────────────────────────────────────────────────────
function renderHeader() {
  document.title = `${CONFIG.name} — Proyectos`;
  document.getElementById('hdr-name').textContent  = CONFIG.name;
  document.getElementById('hdr-title').textContent = CONFIG.title;
  document.getElementById('hdr-bio').textContent   = CONFIG.bio;

  const links = document.getElementById('hdr-links');
  const ghUrl = `https://github.com/${CONFIG.username}`;
  let html = `<a href="${ghUrl}" target="_blank" rel="noopener">${I.github} GitHub</a>`;
  if (CONFIG.linkedinUrl)
    html += `<a href="${CONFIG.linkedinUrl}" target="_blank" rel="noopener">${I.linkedin} LinkedIn</a>`;
  if (CONFIG.email)
    html += `<a href="mailto:${CONFIG.email}">${I.mail} ${CONFIG.email}</a>`;
  links.innerHTML = html;
}

// ─── Estado de repos y filtro activo ─────────────────────────────────────────
let allRepos    = [];
let activeFilter = 'Todos';

// ─── Renderizar cards ─────────────────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('repo-grid');

  let list = activeFilter === 'Todos'
    ? [...allRepos]
    : allRepos.filter(r => r.language === activeFilter);

  // Pinned repos first
  if (CONFIG.pinnedFirst.length) {
    list.sort((a, b) => {
      const ai = CONFIG.pinnedFirst.indexOf(a.name);
      const bi = CONFIG.pinnedFirst.indexOf(b.name);
      if (ai === -1 && bi === -1) return 0;
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });
  }

  if (!list.length) {
    grid.innerHTML = `<div class="state-box">No hay repositorios con este lenguaje.</div>`;
    return;
  }

  grid.innerHTML = list.map(r => {
    const color   = LANG_COLORS[r.language] || '#8b949e';
    const topics  = (r.topics || []).slice(0, 4)
      .map(t => `<span class="card-topic">${t}</span>`).join('');

    return `
      <a class="repo-card" href="${r.html_url}" target="_blank" rel="noopener" role="listitem"
         aria-label="${r.name}${r.description ? ': ' + r.description : ''}">
        <div class="card-name">${r.name}</div>
        <div class="card-desc${r.description ? '' : ' empty'}">
          ${r.description || 'Sin descripción'}
        </div>
        ${topics ? `<div class="card-topics">${topics}</div>` : ''}
        <div class="card-foot">
          ${r.language ? `<span class="card-lang">
            <span class="lang-dot" style="background:${color}"></span>${r.language}
          </span>` : ''}
          ${r.stargazers_count ? `<span class="card-stat">${I.star} ${r.stargazers_count}</span>` : ''}
          ${r.forks_count      ? `<span class="card-stat">${I.fork} ${r.forks_count}</span>`      : ''}
          <span class="card-updated">${ago(r.updated_at)}</span>
        </div>
      </a>`;
  }).join('');
}

// ─── Renderizar filtros ───────────────────────────────────────────────────────
function renderFilters() {
  const langs = [...new Set(allRepos.map(r => r.language).filter(Boolean))].sort();
  const wrap  = document.getElementById('filters');
  wrap.innerHTML = '';

  ['Todos', ...langs].forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (label === activeFilter ? ' active' : '');
    btn.textContent = label;
    btn.setAttribute('aria-pressed', label === activeFilter);
    btn.addEventListener('click', () => {
      activeFilter = label;
      wrap.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', b.textContent === label);
        b.setAttribute('aria-pressed', b.textContent === label);
      });
      renderCards();
    });
    wrap.appendChild(btn);
  });
}

// ─── Estadísticas ─────────────────────────────────────────────────────────────
function renderStats() {
  const stars = allRepos.reduce((s, r) => s + r.stargazers_count, 0);
  const langs = new Set(allRepos.map(r => r.language).filter(Boolean)).size;
  document.getElementById('stats').innerHTML =
    `<span><strong>${allRepos.length}</strong> repos</span>
     <span><strong>${stars}</strong> ★</span>
     <span><strong>${langs}</strong> lenguajes</span>`;
}

// ─── Fetch principal ──────────────────────────────────────────────────────────
async function init() {
  renderHeader();

  if (!CONFIG.username || CONFIG.username === 'TU_USUARIO_GITHUB') {
    document.getElementById('repo-grid').innerHTML =
      `<div class="state-box">⚙️ Configurá tu usuario en <code>CONFIG.username</code> dentro del archivo <code>index.html</code>.</div>`;
    return;
  }

  try {
    const res = await fetch(
      `https://api.github.com/users/${CONFIG.username}/repos?sort=updated&per_page=100`,
      { headers: { Accept: 'application/vnd.github.mercy-preview+json' } }
    );

    if (res.status === 404) throw new Error('Usuario no encontrado.');
    if (res.status === 403) throw new Error('Límite de la API alcanzado. Intentá en unos minutos.');
    if (!res.ok)            throw new Error(`Error ${res.status}: ${res.statusText}`);

    const data = await res.json();
    allRepos = data.filter(r => CONFIG.showForks ? true : !r.fork);

    renderStats();
    renderFilters();
    renderCards();
  } catch (err) {
    document.getElementById('repo-grid').innerHTML =
      `<div class="state-box">⚠️ ${err.message}</div>`;
  }
}

init();
</script>
</body>
</html>
